<style>
  :root {
    --green: #6abf4b;
    --green-dark: #3B6D11;
    --rose: #D4537E;
    --black: #0d0d0d;
    --white: #ffffff;
    --gray-light: #f5f5f3;
    --gray-mid: #e8e8e4;
    --gray-text: #888;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: auto; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--white);
    color: var(--black);
    overflow-x: hidden;
  }

  /* ── CUSTOM CURSOR ── */
  #cursor-dot, #cursor-ring {
    display: none; pointer-events: none;
    position: fixed; transform: translate(-50%, -50%); z-index: 99999;
    will-change: left, top;
  }
  #cursor-dot {
    width: 10px; height: 10px; border-radius: 50%; background: var(--green);
    transition: background 0.25s ease;
  }
  #cursor-ring {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1.5px solid var(--green); opacity: 0.45;
    transition: width 0.35s ease, height 0.35s ease, opacity 0.25s ease, border-color 0.3s ease;
  }
  body.cursor-enabled { cursor: none; }
  body.cursor-enabled a,
  body.cursor-enabled button,
  body.cursor-enabled [role="button"],
  body.cursor-enabled .nav-cta,
  body.cursor-enabled .work-card,
  body.cursor-enabled .service-card { cursor: none; }
  body.cursor-enabled #cursor-dot,
  body.cursor-enabled #cursor-ring { display: block; }
  body.cursor-hover #cursor-dot  { background: var(--rose); }
  body.cursor-hover #cursor-ring { width: 60px; height: 60px; opacity: 0; }
  body.cursor-dark  #cursor-ring { border-color: rgba(255,255,255,0.4); }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.5rem 4rem;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid transparent;
    transition: border-color 0.3s;
  }
  nav.scrolled { border-color: var(--gray-mid); }
  .nav-logo {
    font-weight: 900; font-size: 1.5rem; letter-spacing: -0.03em;
    color: var(--black); text-decoration: none;
  }
  .nav-logo span { color: var(--green); }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a {
    font-size: 0.9rem; font-weight: 400; color: var(--black);
    text-decoration: none; letter-spacing: 0.02em;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--rose); }
  .nav-cta {
    font-size: 0.85rem; font-weight: 700; padding: 0.6rem 1.4rem;
    background: var(--black); color: var(--white);
    border: none; cursor: pointer; border-radius: 100px;
    text-decoration: none; transition: background 0.2s;
  }
  .nav-cta:hover { background: var(--green-dark); }

  /* HERO */
  #hero {
    min-height: 100vh;
    display: flex; flex-direction: column; justify-content: center;
    padding: 10rem 4rem 7rem;
    background: radial-gradient(circle at top left, rgba(106,191,75,0.16), transparent 28%), radial-gradient(circle at 85% 15%, rgba(212,83,126,0.14), transparent 24%), var(--black);
    position: relative; overflow: visible;
  }
  .hero-content { position: relative; z-index: 2; max-width: 860px; }
  .hero-eyebrow {
    font-size: 0.75rem; font-weight: 400; color: rgba(255,255,255,0.38);
    letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 2.5rem;
  }
  .hero-headline {
    font-size: clamp(3.2rem, 6.5vw, 6rem);
    font-weight: 900; line-height: 1.06;
    color: var(--white);
    letter-spacing: -0.04em;
  }
  .hero-headline .dot-i {
    position: relative;
    display: inline-block;
    /* Override the font's own dot by making letter dotless-style via pseudo */
  }
  .hero-headline .dot-i .green-dot {
    display: inline-block;
    width: 0.22em; height: 0.22em;
    background: var(--green);
    border-radius: 50%;
    position: absolute;
    top: 0.1em; left: 50%; transform: translateX(-50%);
  }
  .hero-sub {
    font-size: clamp(1rem, 1.6vw, 1.15rem);
    font-weight: 300; color: rgba(255,255,255,0.45);
    margin-top: 1.5rem; letter-spacing: 0.01em;
  }
  .hero-actions { display: flex; gap: 1rem; margin-top: 3rem; flex-wrap: wrap; }
  .btn-primary {
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem; font-weight: 700;
    padding: 0.85rem 2rem; border-radius: 100px;
    background: var(--white); color: var(--black);
    border: none; cursor: pointer; text-decoration: none;
    transition: background 0.2s, color 0.2s;
    display: inline-block;
  }
  .btn-primary:hover { background: var(--green); color: var(--white); }
  .btn-secondary {
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem; font-weight: 400;
    padding: 0.85rem 2rem; border-radius: 100px;
    background: transparent; color: var(--white);
    border: 1px solid rgba(255,255,255,0.22);
    cursor: pointer; text-decoration: none;
    transition: border-color 0.2s, background 0.2s;
    display: inline-block;
  }
  .btn-secondary:hover { border-color: var(--rose); background: rgba(212,83,126,0.08); }

  /* TAGLINE STRIP */
  .tagline-strip {
    background: var(--green);
    padding: 1.1rem 0;
    overflow: hidden;
    position: relative;
  }
  .tagline-track {
    display: flex; gap: 3rem; width: max-content;
    animation: marquee 22s linear infinite;
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .tagline-item {
    font-size: 0.85rem; font-weight: 700; color: var(--white);
    letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap;
  }
  .tagline-item .dot { color: var(--black); margin: 0 1rem; }

  /* SECTIONS SHARED */
  section { padding: 7rem 4rem; }
  .section-label {
    font-size: 0.75rem; font-weight: 700; color: var(--gray-text);
    letter-spacing: 0.15em; text-transform: uppercase;
    margin-bottom: 2rem;
  }
  .section-headline {
    font-size: clamp(2rem, 4vw, 3.5rem);
    font-weight: 900; line-height: 1.1;
    letter-spacing: -0.03em;
  }

  /* ABOUT / BRIDGE */
  #about { background: var(--white); }
  .about-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: start;
    margin-top: 3rem;
  }
  .about-body {
    font-size: 1.1rem; font-weight: 300; line-height: 1.85;
    color: #333;
  }
  .about-body strong { font-weight: 700; color: var(--black); }
  .about-stat-col { display: flex; flex-direction: column; gap: 2rem; padding-top: 0.5rem; }
  .stat-card {
    border-top: 2px solid var(--black);
    padding-top: 1rem;
  }
  .stat-num {
    font-size: 3rem; font-weight: 900; letter-spacing: -0.04em; line-height: 1;
    color: var(--black);
  }
  .stat-num span { color: var(--green); }
  .stat-desc { font-size: 0.85rem; color: var(--gray-text); margin-top: 0.4rem; }

  /* WHAT WE DO */
  #services { background: var(--black); color: var(--white); }
  #services .section-label { color: rgba(255,255,255,0.35); }
  #services .section-headline { color: var(--white); }
  .services-headline-row {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 4rem; flex-wrap: wrap; gap: 1rem;
  }
  .services-intro {
    font-size: 1rem; font-weight: 300; color: rgba(255,255,255,0.55);
    max-width: 420px; line-height: 1.7;
  }
  .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5px; }
  .service-card {
    background: #111;
    padding: 2.5rem 2rem;
    border: 1px solid #1f1f1f;
    transition: background 0.3s;
    cursor: default;
  }
  .service-card:hover { background: #161616; }
  .service-card:hover .service-arrow { color: var(--green); }
  .service-num {
    font-size: 0.75rem; color: rgba(255,255,255,0.25);
    letter-spacing: 0.15em; margin-bottom: 2rem;
  }
  .service-title {
    font-size: 1.4rem; font-weight: 700; margin-bottom: 1rem;
    color: var(--white);
  }
  .service-desc {
    font-size: 0.9rem; font-weight: 300; line-height: 1.75;
    color: rgba(255,255,255,0.5);
  }
  .service-arrow {
    display: block; margin-top: 2rem;
    font-size: 1.4rem; color: rgba(255,255,255,0.15);
    transition: color 0.3s;
  }
